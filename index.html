<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#2c1810" />
  <title>Virtual Café — Mixed Reality</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a0f0a;
      -webkit-tap-highlight-color: transparent;
    }
    #scene-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
      z-index: 0;
      pointer-events: none;
    }
    #camera-video {
      position: absolute;
      width: 1px; height: 1px;
      opacity: 0;
      pointer-events: none;
    }
    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      color: rgba(255,255,255,0.85);
      font: 14px/1.4 system-ui, sans-serif;
      text-align: center;
      padding: 10px 16px;
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      max-width: 90%;
      pointer-events: none;
    }
    #hint.hidden { display: none; }
    #start-btn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      padding: 18px 32px;
      font: 18px system-ui, sans-serif;
      font-weight: 600;
      color: #1a0f0a;
      background: #c9a227;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    #start-btn:hover { background: #d4b030; }
    #start-btn:active { transform: translate(-50%, -50%) scale(0.98); }
    #start-btn.hidden { display: none; }
  </style>
</head>
<body>
  <canvas id="scene-canvas"></canvas>
  <video id="camera-video" autoplay playsinline muted></video>
  <button type="button" id="start-btn">Tap to start — camera + look around</button>
  <p id="hint">Tap to start. You’re in a café—move your phone to look around; the table in front of you has a cutout where you see your real food & drinks.</p>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/jsm/loaders/RGBELoader.js": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/RGBELoader.js"
      }
    }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
